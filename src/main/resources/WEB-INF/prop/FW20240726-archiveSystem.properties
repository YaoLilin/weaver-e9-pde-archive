# ------------ 档案系统接口配置，所以属性都必填，以下属性值请联系档案系统相关人员获取 ------------
# 接口平台服务器地址，为档案推送调用接口所处服务器地址
serverAddress=
# 通信码，用于文件上传
code=
# 文件上传地址
fileUploadUrl=
# 档案推送地址，不带服务器地址
archiveUrl=/assem/dataReceive/requestDataArchiving
# 获取档案系统查询归档状态接口地址，不带服务器地址
queryStatusUrl=/assem/dataReceive/queryDataStatus
# 档案系统单点登陆地址
ssoUrl=http://address/archives/UupmSso/v1/ssoLogon
# 文件上传账号
userName=user
# 文件上传密码
password=password

# ----------------------------- 档案参数配置 ------------------------------
# 必填，来源系统代码，填当前系统名称，如：OA系统
sourceSystemCode=OA系统
# 必填公司名称，填当前公司名称，如：广西汽车集团有限公司
companyName=

# ----------------------------- 归档范围查询，如果档案没有要求此功能，则不启用 ------------------------------
# 是否启用查询归档范围来判断是否需要归档，1 为是，其它位否，如果为是，则调用接口查询归档范围，根据题名关键字进行查询是否在归档范围内，如果
# 不在归档范围内则不需要推送到档案系统进行归档，为否时，不进行归档范围判断，直接推送到档案系统
enableArchivingScope=0
# 启用时必填，归档范围查询接口地址
archivingScopeUrl=http://address/AmsOaApi/archivingScope
# 启用时必填，归档范围查询接口tableId
tableId=101

# ------------------------------ 文件转换方式 ------------------------------
# 必填，文档pdf转换方式，值域：wps、wpsApi ,当为 wps ,oa必需集成wps，使用wps进行pdf转换，当为 wpsApi 时，服务器必需部署wps中台，调用wps 接口进行转换
fileConvertMethod=wps
# 当 fileConvertMethod=wpsApi 时，以下属性必填
# 为 wpsApi 转换时必填，wps服务器地址（域名或ip）
wpsServerHost=
# 为 wpsApi 转换时必填，wps Secret key，需在wps系统后台获取
wpsSecret=
# 为 wpsApi 转换时必填，wps AccessKey，需在wps系统后台获取
wpsAccessKey=
# 为 wpsApi 转换时必填，OA访问地址
oaAddress=

# ------------------------------ 契约锁配置，用于验证文件签名 ------------------------------
# 是否开启契约锁签名验证，0:不开启，1:开启，如果开启，则需要配置契约锁相关配置
enableQysSignatureVerify=0
# 启用时必填，契约锁契约锁开放平台地址
qysServerAddress=
# 启用时必填，契约锁Token
qysToken=
# 启用时必填，契约锁AccessSecret
qysSecret=

# 是否删除临时文件，0:不删除，1:删除，如果不是调试需要，建议删除临时文件，否则临时文件会占用很多空间
deleteTempFiles=1
